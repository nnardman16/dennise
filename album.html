<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Our Memories 🩷</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rose: #c93b5a; --blush: #f4aec4; --deep: #4a0b1c;
      --violet: #7c3db5; --night: #06030e; --ink: #0f0620;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--night);
      min-height: 100vh; overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    #starsCanvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); pointer-events: none; z-index: 0;
      animation: orbDrift var(--od,18s) ease-in-out infinite alternate;
    }
    @keyframes orbDrift {
      0%   { transform: translate(0,0) scale(1); }
      100% { transform: translate(var(--ox,20px),var(--oy,-15px)) scale(1.1); }
    }

    /* ── HEADER ── */
    #pageHeader {
      position: relative; z-index: 10; text-align: center;
      padding: clamp(2.8rem,8vh,5rem) 1.5rem clamp(1.2rem,3vh,2rem);
      opacity: 0; animation: fadeDown 1s ease 0.3s forwards;
    }
    .header-tag {
      font-size: 0.68rem; font-weight: 500;
      letter-spacing: 0.38em; text-transform: uppercase;
      color: rgba(200,150,235,0.5); margin-bottom: 0.7rem;
    }
    #pageHeader h1 {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: clamp(1.9rem,6vw,3.2rem);
      color: rgba(255,228,242,0.97);
      text-shadow: 0 0 55px rgba(205,105,255,0.55), 0 2px 12px rgba(0,0,0,0.5);
      line-height: 1.2;
    }
    .header-rule {
      width: 55px; height: 1px; margin: 1rem auto 0;
      background: linear-gradient(90deg,transparent,rgba(195,125,255,0.5),transparent);
    }
    .header-sub {
      margin-top: 0.65rem; font-size: 0.75rem; font-weight: 300;
      color: rgba(210,160,240,0.42); letter-spacing: 0.15em;
    }

    /* ── GALLERY ── */
    #gallery {
      position: relative; z-index: 5;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(290px,88vw),1fr));
      gap: clamp(1.2rem,3vw,2rem);
      padding: 0 clamp(1rem,4vw,3.5rem) clamp(4rem,10vh,7rem);
      max-width: 1100px; margin: 0 auto;
    }

    /* ── CARD ── */
    .mem-card {
      position: relative; border-radius: 20px; overflow: hidden;
      cursor: pointer; opacity: 0; transform: translateY(32px);
      animation: cardReveal 0.8s cubic-bezier(.34,1.1,.64,1) forwards;
      border: 1px solid rgba(200,130,255,0.1);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      transition: transform 0.22s ease, box-shadow 0.3s ease;
    }
    @keyframes cardReveal {
      from { opacity:0; transform:translateY(36px) scale(0.95); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }
    .mem-card:hover {
      transform: translateY(-7px) scale(1.025);
      box-shadow: 0 28px 65px rgba(0,0,0,0.65), 0 0 45px rgba(185,100,255,0.2);
    }
    .mem-card:active { transform: scale(0.97); }

    /* Photo */
    .mem-photo {
      position: relative; width: 100%; aspect-ratio: 3/4; overflow: hidden;
    }
    .mem-photo img {
      width: 100%; height: 100%; object-fit: cover;
      display: block; transition: transform 0.5s ease;
      filter: brightness(0.92) saturate(1.1);
    }
    .mem-card:hover .mem-photo img { transform: scale(1.06); }

    /* Overlay gradient on photo */
    .mem-photo::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to bottom,
        transparent 40%,
        rgba(4,1,14,0.55) 75%,
        rgba(4,1,14,0.85) 100%);
      pointer-events: none; z-index: 1;
    }

    /* Emoji badge floating on photo */
    .mem-emoji {
      position: absolute; top: 12px; right: 14px; z-index: 2;
      font-size: 1.4rem;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
      animation: floatEmoji 3.5s ease-in-out infinite;
    }
    @keyframes floatEmoji {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-5px); }
    }

    /* Label inside photo (bottom) */
    .mem-photo-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      z-index: 2; padding: 0.8rem 1rem 0.6rem;
    }
    .mem-label-tag {
      font-size: 0.6rem; font-weight: 500;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: rgba(200,150,255,0.6); margin-bottom: 0.2rem;
    }
    .mem-title {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: clamp(0.9rem,2.2vw,1.08rem);
      color: rgba(255,222,240,0.96); line-height: 1.3;
    }

    /* Bottom strip */
    .mem-info {
      background: rgba(7,2,20,0.92); backdrop-filter: blur(14px);
      border-top: 1px solid rgba(185,110,240,0.1);
      padding: 0.7rem 1rem 0.75rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .mem-hint {
      font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(200,140,255,0.28);
      animation: hintPulse 2.4s ease-in-out infinite;
    }
    @keyframes hintPulse { 0%,100%{opacity:.28;} 50%{opacity:.65;} }
    .mem-tap-icon { font-size: 0.85rem; opacity: 0.45; }

    /* ── MODAL ── */
    #modalBg {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(3,1,12,0.88); backdrop-filter: blur(22px);
      display: flex; align-items: center; justify-content: center;
      padding: 1.2rem; opacity: 0; pointer-events: none;
      transition: opacity 0.38s ease;
    }
    #modalBg.open { opacity: 1; pointer-events: all; }

    .modal-card {
      position: relative; width: min(480px,100%);
      background: rgba(12,3,30,0.95);
      border: 1px solid rgba(210,140,255,0.18);
      border-radius: 24px; overflow: hidden;
      box-shadow: 0 50px 120px rgba(0,0,0,0.8), inset 0 1px 0 rgba(235,185,255,0.07);
      transform: scale(0.88) translateY(22px);
      transition: transform 0.44s cubic-bezier(.34,1.15,.64,1);
      max-height: 90vh; overflow-y: auto;
    }
    #modalBg.open .modal-card { transform: scale(1) translateY(0); }

    /* Modal photo */
    .modal-photo {
      position: relative; width: 100%; aspect-ratio: 4/3; overflow: hidden;
    }
    .modal-photo img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      filter: brightness(0.95) saturate(1.15);
    }
    .modal-photo::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(12,3,30,0.9) 100%);
    }
    .modal-photo-emoji {
      position: absolute; bottom: 12px; right: 14px; z-index: 2;
      font-size: 1.8rem; filter: drop-shadow(0 2px 10px rgba(0,0,0,0.7));
    }

    /* Modal text */
    .modal-body { padding: 1.5rem 1.8rem 1.8rem; }
    .modal-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--rose), var(--deep));
      color: #fff; font-size: 0.58rem; font-weight: 600;
      letter-spacing: 0.3em; text-transform: uppercase;
      padding: 0.25rem 0.9rem; border-radius: 50px; margin-bottom: 0.8rem;
    }
    .modal-title {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: clamp(1.15rem,3.5vw,1.55rem);
      color: rgba(255,228,242,0.97);
      text-shadow: 0 0 28px rgba(210,110,255,0.4);
      margin-bottom: 0.8rem; line-height: 1.3;
    }
    .modal-divider {
      font-size: 0.85rem; letter-spacing: 0.7em; opacity: 0.35;
      margin: 0.85rem 0; text-align: center;
    }
    .modal-caption {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: clamp(1rem,2.5vw,1.15rem);
      color: rgba(240,200,222,0.82); line-height: 1.9;
    }
    .modal-close {
      display: block; width: 100%; margin-top: 1.5rem;
      background: linear-gradient(135deg,rgba(200,80,115,0.14),rgba(130,50,190,0.14));
      border: 1px solid rgba(240,155,185,0.3);
      color: rgba(255,210,228,0.88);
      font-family: 'DM Sans', sans-serif; font-size: 0.75rem; font-weight: 500;
      letter-spacing: 0.22em; text-transform: uppercase;
      padding: 0.75rem 2rem; border-radius: 999px; cursor: pointer;
      transition: all 0.2s ease; backdrop-filter: blur(10px);
    }
    .modal-close:hover { background: rgba(200,80,115,0.26); }
    .modal-close:active { transform: scale(0.95); }

    /* ── HEARTS ── */
    .heart-burst {
      position: fixed; pointer-events: none; font-size: 1.1rem; z-index: 9999;
      animation: burstUp 0.9s ease forwards;
    }
    @keyframes burstUp {
      0%   { opacity:1; transform:translate(-50%,-50%) scale(0.4); }
      55%  { opacity:1; transform:translate(-50%,-150%) scale(1.2); }
      100% { opacity:0; transform:translate(-50%,-230%) scale(0.8); }
    }

    /* ── NAV ── */
    .nav-row {
      position: relative; z-index: 10;
      display: flex; justify-content: center;
      gap: 1rem; flex-wrap: wrap;
      padding: 0 1.5rem clamp(2.5rem,6vh,4rem);
      opacity: 0; animation: fadeDown 0.8s ease 1.5s forwards;
    }
    .nav-btn {
      background: linear-gradient(135deg,rgba(200,80,115,0.14),rgba(130,50,190,0.14));
      border: 1px solid rgba(240,155,185,0.35);
      color: rgba(255,220,232,0.92);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase;
      padding: 0.82rem 2rem; border-radius: 999px;
      cursor: pointer; backdrop-filter: blur(12px);
      text-decoration: none; display: inline-block;
      transition: all 0.22s ease;
    }
    .nav-btn:hover { background: rgba(200,80,115,0.26); border-color: rgba(240,155,185,0.65); }
    .nav-btn:active { transform: scale(0.94); }

    /* ── PETALS ── */
    .petal-float {
      position: fixed; pointer-events: none; z-index: 1;
      font-size: var(--ps,1rem); opacity: 0;
      animation: petalDrift var(--pd,7s) ease-in var(--pdel,0s) infinite;
    }
    @keyframes petalDrift {
      0%   { opacity:0; transform:translateY(0) rotate(0deg); }
      12%  { opacity:0.7; }
      85%  { opacity:0.4; }
      100% { opacity:0; transform:translateY(-105vh) rotate(30deg); }
    }
    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-14px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(185,110,255,0.2); border-radius: 2px; }
  </style>
</head>
<body>

<canvas id="starsCanvas"></canvas>
<div class="orb" style="left:5%;top:10%;width:340px;height:200px;background:radial-gradient(ellipse,rgba(110,28,188,0.22) 0%,transparent 70%);--od:22s;--ox:28px;--oy:-18px;"></div>
<div class="orb" style="right:8%;top:30%;width:280px;height:180px;background:radial-gradient(ellipse,rgba(68,14,145,0.18) 0%,transparent 70%);--od:18s;--ox:-22px;--oy:15px;"></div>
<div class="orb" style="left:35%;bottom:15%;width:380px;height:220px;background:radial-gradient(ellipse,rgba(130,40,200,0.15) 0%,transparent 70%);--od:26s;--ox:15px;--oy:-12px;"></div>
<div id="petalsLayer"></div>

<header id="pageHeader">
  <p class="header-tag">A little piece of us</p>
  <h1>Our Memories 🩷</h1>
  <div class="header-rule"></div>
  <p class="header-sub">tap a frame to remember</p>
</header>

<div id="gallery"></div>

<div class="nav-row">
  <a href="next-scene.html" class="nav-btn">Tap here to continue →</a>
</div>

<div id="modalBg">
  <div class="modal-card" id="modalCard">
    <div class="modal-photo"><img id="modalImg" src="" alt=""/><div class="modal-photo-emoji" id="modalEmoji"></div></div>

      <div class="modal-badge" id="modalBadge"></div>
      <h2 class="modal-title" id="modalTitle"></h2>

      <p class="modal-caption" id="modalCaption"></p>
      <button class="modal-close" id="modalClose">Close ✕</button>
    </div>
  </div>
</div>

      <div class="mem-photo-label">
        <div class="mem-label-tag">${mem.label}</div>
        <div class="mem-title">${mem.title}</div>
      </div>
    </div>
    <div class="mem-info">
      <span class="mem-hint">tap to open ✦</span>
      <span class="mem-tap-icon">🩷</span>
    </div>
  `;
  card.addEventListener('click', (e) => openModal(mem, e));
  gallery.appendChild(card);
});

/* ── MODAL ── */
const modalBg  = document.getElementById('modalBg');
function openModal(mem, e) {
  document.getElementById('modalImg').src       = mem.img;
  document.getElementById('modalEmoji').textContent = mem.emoji;
  document.getElementById('modalBadge').textContent = mem.label;
  document.getElementById('modalTitle').textContent = mem.title;
  document.getElementById('modalCaption').textContent = mem.caption;
  modalBg.classList.add('open');
  spawnHearts(e.clientX, e.clientY, 5);
}
document.getElementById('modalClose').addEventListener('click', () => modalBg.classList.remove('open'));
modalBg.addEventListener('click', e => { if (e.target === modalBg) modalBg.classList.remove('open'); });

/* ── HEARTS ── */
const hEmojis = ['🩷','💕','🌸','💫','✨','🌷','💜'];
document.addEventListener('click', e => spawnHearts(e.clientX, e.clientY, 3));
function spawnHearts(x, y, count) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const h = document.createElement('div');
      h.className = 'heart-burst';
      h.textContent = hEmojis[Math.floor(Math.random() * hEmojis.length)];
      h.style.left = (x + (Math.random()-0.5)*40)+'px';
      h.style.top  = y+'px';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 960);
    }, i*65);
  }
}

/* ── STARS ── */
(function(){
  const canvas = document.getElementById('starsCanvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  const stars = Array.from({length:130}, () => ({
    x:Math.random(), y:Math.random(),
    r:0.4+Math.random()*1.8,
    speed:0.4+Math.random()*2,
    phase:Math.random()*Math.PI*2,
  }));
  function resize(){ W=canvas.width=innerWidth; H=canvas.height=innerHeight; }
  resize(); window.addEventListener('resize', resize);
  function draw(ts){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s=>{
      const a=0.12+0.5*Math.abs(Math.sin(ts*0.0008*s.speed+s.phase));
      ctx.beginPath(); ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(235,210,255,${a.toFixed(2)})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();

/* ── PETALS ── */
(function(){
  const pool=['🩷','🌸','💫','✨','🌷','💕','⭐'];
  const layer=document.getElementById('petalsLayer');
  for(let i=0;i<16;i++){
    const el=document.createElement('div'); el.className='petal-float';
    el.textContent=pool[Math.floor(Math.random()*pool.length)];
    el.style.left=Math.random()*100+'vw'; el.style.bottom='-6vh';
    el.style.setProperty('--ps',(0.75+Math.random()*0.9)+'rem');
    el.style.setProperty('--pd',(5+Math.random()*6)+'s');
    el.style.setProperty('--pdel',(Math.random()*10)+'s');
    layer.appendChild(el);
  }
})();
</script>
